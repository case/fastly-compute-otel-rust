name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  WASI_TARGET: wasm32-wasip1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.WASI_TARGET }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --target "$WASI_TARGET" -- -D warnings

  test:
    name: Test (${{ matrix.name }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            features: ""
          - name: trace-only
            features: "--no-default-features --features trace"
          - name: logs-only
            features: "--no-default-features --features logs"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test ${{ matrix.features }}
